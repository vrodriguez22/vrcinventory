<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VRC — Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --pink:#e60073;
  --pink-l:#ff4fa3;
  --cream:#f5f0eb;
  --dark:#0e0c0d;
  --mid:#1c1719;
  --gold:#c9a96e;
  --text:#e8e0d8;
  --muted:#9a8f88;
}

body{
  font-family:'DM Sans',sans-serif;
  background:#f7f3f0;
  color:#333;
}

/* NAV */
nav{
  background:var(--dark);
  padding:18px 48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:600;
  letter-spacing:0.12em;
  color:var(--cream);
  text-decoration:none;
}

.nav-logo span{color:var(--pink);}

.nav-back{
  font-size:13px;
  color:var(--muted);
  text-decoration:none;
  letter-spacing:0.08em;
  display:flex;
  align-items:center;
  gap:6px;
  transition:color .2s;
}

.nav-back:hover{color:var(--cream);}

/* PAGE HEADER */
.page-header{
  background:var(--dark);
  padding:48px 48px 40px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.page-header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;
  font-weight:300;
  color:var(--cream);
  line-height:1;
  margin-bottom:8px;
}

.page-header p{
  font-size:14px;
  color:var(--muted);
  letter-spacing:0.06em;
}

/* CONTROLS */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  padding:24px 48px;
  background:white;
  border-bottom:1px solid #eee;
  position:sticky;
  top:61px;
  z-index:90;
}

.controls input,
.controls select{
  padding:10px 14px;
  border-radius:6px;
  border:1px solid #e0d8d4;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:#444;
  background:white;
  min-width:160px;
}

.controls input:focus,
.controls select:focus{
  outline:none;
  border-color:var(--pink);
}

.check-label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color:#666;
  cursor:pointer;
}

.check-label input{accent-color:var(--pink);}

.result-count{
  margin-left:auto;
  font-size:13px;
  color:var(--muted);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:24px;
  padding:32px 48px;
}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.07);
  transition:transform .25s ease, box-shadow .25s ease;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 28px rgba(0,0,0,0.12);
}

.card-img-wrap{
  position:relative;
  overflow:hidden;
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
  display:block;
  transition:transform .4s ease;
}

.card:hover img{transform:scale(1.04);}

.sold-badge{
  position:absolute;
  top:12px;
  right:12px;
  background:rgba(14,12,13,0.85);
  color:white;
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:5px 10px;
  border-radius:4px;
  backdrop-filter:blur(6px);
}

.card-content{
  padding:16px 18px 20px;
}

.card h3{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  font-weight:400;
  color:#222;
  margin-bottom:4px;
}

.card-meta{
  font-size:12px;
  color:#999;
  letter-spacing:0.06em;
  margin-bottom:10px;
}

.price{
  color:var(--pink);
  font-weight:600;
  font-size:20px;
  margin-bottom:14px;
}

.card button{
  width:100%;
  background:var(--dark);
  color:white;
  border:none;
  padding:11px;
  border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .2s;
}

.card button:hover{background:var(--pink);}

.card button.sold-btn{
  background:#ccc;
  color:#888;
  cursor:not-allowed;
}

/* EMPTY STATE */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:80px 20px;
  color:#bbb;
}

.empty h3{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  font-weight:300;
  margin-bottom:8px;
  color:#ccc;
}

/* MODAL */
#productModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(14,12,13,0.8);
  z-index:200;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(4px);
}

#productModal.open{display:flex;}

.modal-box{
  background:white;
  border-radius:14px;
  max-width:460px;
  width:90%;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.3);
  animation:slideUp .3s ease;
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.modal-box img{
  width:100%;
  height:300px;
  object-fit:cover;
  display:block;
}

.modal-body{padding:24px;}

.modal-body h2{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:400;
  margin-bottom:6px;
}

.modal-body .modal-meta{font-size:13px;color:#999;margin-bottom:8px;}
.modal-body .modal-price{color:var(--pink);font-size:22px;font-weight:600;margin-bottom:20px;}

.modal-actions{display:flex;gap:10px;}

.modal-actions button{
  flex:1;
  padding:12px;
  border-radius:7px;
  border:none;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .2s;
}

.btn-wa{background:var(--pink);color:white;}
.btn-wa:hover{background:var(--pink-l);}
.btn-close{background:#f0ece8;color:#555;}
.btn-close:hover{background:#e5e0dc;}

@media(max-width:700px){
  nav,
  .page-header,
  .controls,
  .grid{padding-left:20px;padding-right:20px;}
  .page-header h1{font-size:36px;}
  .result-count{display:none;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">VRC<span>.</span></a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>The Catalog</h1>
  <p>Curated second-hand luxury — updated regularly.</p>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input id="search" type="search" placeholder="Search brand or category…" />

  <select id="categoryFilter">
    <option value="">All Categories</option>
  </select>

  <select id="sizeFilter">
    <option value="">All Sizes</option>
  </select>

  <label class="check-label">
    <input type="checkbox" id="availableOnly" />
    Available only
  </label>

  <span class="result-count" id="resultCount"></span>
</div>

<!-- GRID -->
<div class="grid" id="catalog"></div>

<!-- MODAL -->
<div id="productModal">
  <div class="modal-box">
    <img id="modalImage" src="" alt="" />
    <div class="modal-body">
      <h2 id="modalBrand"></h2>
      <p class="modal-meta" id="modalInfo"></p>
      <p class="modal-price" id="modalPrice"></p>
      <div class="modal-actions">
        <button class="btn-wa" id="modalBuy">Buy on WhatsApp</button>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTuEKefQDxrysNzNz9r0jcE4awZ4Ck27lj4kq613Rd3KYrHawN-epn-qsrWg1Hs2gRXETsI6VhLqQ74/pub?output=csv";
const phone="50766720627";
let items=[];

const searchInput=document.getElementById("search");
const categoryFilter=document.getElementById("categoryFilter");
const sizeFilter=document.getElementById("sizeFilter");
const availableOnly=document.getElementById("availableOnly");
const catalog=document.getElementById("catalog");
const resultCount=document.getElementById("resultCount");

fetch(sheetURL)
  .then(r=>r.text())
  .then(data=>{
    const rows=data.split("\n").slice(1).filter(r=>r.trim());
    rows.forEach(r=>{
      // handle quoted CSV fields (Google Sheets sometimes wraps commas in quotes)
      const c=r.split(",");
      items.push({
        id:(c[0]||"").trim(),
        category:(c[1]||"").trim(),
        brand:(c[2]||"").trim(),
        size:(c[3]||"").trim(),
        price:(c[4]||"").trim(),
        condition:(c[5]||"").trim(),
        photo:(c[6]||"").trim(),
        status:(c[7]||"").trim()
      });
    });
    populateFilters();

    // honour category pre-filter from homepage
    const prefilter=sessionStorage.getItem("vrc_filter_cat");
    if(prefilter){
      categoryFilter.value=prefilter;
      sessionStorage.removeItem("vrc_filter_cat");
    }

    render();
  })
  .catch(()=>{
    catalog.innerHTML=`<div class="empty"><h3>Couldn't load catalog</h3><p>Please check your connection and try again.</p></div>`;
  });

function populateFilters(){
  const catSet=new Set();
  const sizeSet=new Set();
  items.forEach(i=>{if(i.category)catSet.add(i.category);if(i.size)sizeSet.add(i.size);});
  catSet.forEach(c=>{categoryFilter.innerHTML+=`<option value="${c}">${c}</option>`;});
  sizeSet.forEach(s=>{sizeFilter.innerHTML+=`<option value="${s}">${s}</option>`;});
}

function render(){
  const search=searchInput.value.toLowerCase();
  const cat=categoryFilter.value;
  const size=sizeFilter.value;
  const available=availableOnly.checked;

  const filtered=items.filter(i=>{
    if(search && !(i.brand+i.category).toLowerCase().includes(search)) return false;
    if(cat && i.category!==cat) return false;
    if(size && i.size!==size) return false;
    if(available && i.status!=="Available") return false;
    return true;
  });

  resultCount.textContent=`${filtered.length} piece${filtered.length!==1?"s":""}`;
  catalog.innerHTML="";

  if(!filtered.length){
    catalog.innerHTML=`<div class="empty"><h3>No pieces found</h3><p>Try adjusting your filters.</p></div>`;
    return;
  }

  filtered.forEach(i=>{
    const sold=i.status!=="Available";
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-img-wrap">
        <img src="${i.photo}" alt="${i.brand}" loading="lazy" />
        ${sold?'<span class="sold-badge">Sold</span>':""}
      </div>
      <div class="card-content">
        <h3>${i.brand}</h3>
        <p class="card-meta">${i.category} · Size ${i.size} · ${i.condition}</p>
        <p class="price">$${i.price}</p>
        <button class="${sold?"sold-btn":""}" ${sold?"disabled":""} onclick="${sold?"":"openModal('"+i.id+"')"}">
          ${sold?"Sold Out":"Buy on WhatsApp"}
        </button>
      </div>`;
    card.querySelector(".card-img-wrap").addEventListener("click",()=>{
      if(!sold) openModal(i.id);
    });
    catalog.appendChild(card);
  });
}

function openModal(id){
  const i=items.find(x=>x.id===id);
  if(!i) return;
  document.getElementById("modalImage").src=i.photo;
  document.getElementById("modalBrand").textContent=i.brand;
  document.getElementById("modalInfo").textContent=`${i.category} · Size ${i.size} · ${i.condition}`;
  document.getElementById("modalPrice").textContent=`$${i.price}`;
  document.getElementById("modalBuy").onclick=()=>buy(id);
  document.getElementById("productModal").classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("productModal").classList.remove("open");
  document.body.style.overflow="";
}

// close modal on backdrop click
document.getElementById("productModal").addEventListener("click",e=>{
  if(e.target===document.getElementById("productModal")) closeModal();
});

function buy(id){
  const msg=`Hi! I'm interested in item ${id} from VRC Thrift Shop.`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

searchInput.oninput=render;
categoryFilter.onchange=render;
sizeFilter.onchange=render;
availableOnly.onchange=render;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VRC — Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --pink:   #d4688a;
  --pink-l: #e88aa8;
  --cream:  #f5f0eb;
  --dark:   #0e0c0d;
  --mid:    #1c1719;
  --gold:   #c9a96e;
  --text:   #e8e0d8;
  --muted:  #9a8f88;
  --pad-x:  clamp(16px,4vw,48px);
}

body { font-family:'DM Sans',sans-serif; background:#f4f0ec; color:#333; }

/* NAV */
nav {
  background:var(--dark);
  padding:15px var(--pad-x);
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0; z-index:100;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.nav-logo { display:flex; align-items:center; height:36px; text-decoration:none; }
.nav-logo svg { height:100%; width:auto; }

.nav-back {
  font-size:12px; color:var(--muted); text-decoration:none;
  letter-spacing:.08em; display:flex; align-items:center; gap:6px;
  transition:color .2s;
}

.nav-back:hover { color:var(--cream); }

/* PAGE HEADER */
.page-header {
  background:var(--dark);
  padding:clamp(32px,6vw,52px) var(--pad-x) clamp(28px,5vw,44px);
  border-bottom:1px solid rgba(255,255,255,.05);
}

.page-header h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,7vw,56px);
  font-weight:300; color:var(--cream); line-height:1; margin-bottom:8px;
}

.page-header p { font-size:13px; color:var(--muted); letter-spacing:.06em; }

/* CONTROLS */
.controls {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  padding:18px var(--pad-x);
  background:white;
  border-bottom:1px solid #e8e2dc;
  position:sticky;
  top:66px; z-index:90;
}

.controls input,
.controls select {
  padding:9px 14px;
  border-radius:6px;
  border:1px solid #ddd6d0;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:#444;
  background:white;
  min-width:clamp(120px,20vw,160px);
  flex:1 1 120px;
  max-width:220px;
}

.controls input:focus,
.controls select:focus { outline:none; border-color:var(--pink); }

.check-label {
  display:flex; align-items:center; gap:8px;
  font-size:13px; color:#666; cursor:pointer; white-space:nowrap;
}

.check-label input { accent-color:var(--pink); width:15px; height:15px; }

.result-count { margin-left:auto; font-size:12px; color:var(--muted); white-space:nowrap; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(clamp(160px,28vw,240px),1fr));
  gap:clamp(14px,2.5vw,24px);
  padding:clamp(20px,4vw,32px) var(--pad-x);
}

/* CARD */
.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  transition:transform .25s ease, box-shadow .25s ease;
}

.card:hover { transform:translateY(-5px); box-shadow:0 10px 26px rgba(0,0,0,.12); }

.card-img-wrap { position:relative; overflow:hidden; }

.card img {
  width:100%;
  height:clamp(200px,35vw,280px);
  object-fit:cover;
  display:block;
  transition:transform .4s ease;
}

.card:hover img { transform:scale(1.04); }

.sold-badge {
  position:absolute; top:10px; right:10px;
  background:rgba(14,12,13,.82);
  color:white; font-size:9px; letter-spacing:.16em;
  text-transform:uppercase; padding:4px 10px;
  border-radius:4px; backdrop-filter:blur(6px);
}

.card-content { padding:clamp(12px,2vw,16px) clamp(14px,2vw,18px) clamp(14px,2vw,20px); }
.card h3 { font-family:'Cormorant Garamond',serif; font-size:clamp(17px,2.5vw,20px); font-weight:400; color:#222; margin-bottom:4px; }
.card-meta { font-size:11px; color:#999; letter-spacing:.05em; margin-bottom:8px; }
.price { color:var(--pink); font-weight:600; font-size:clamp(17px,2.5vw,20px); margin-bottom:12px; }

.card button {
  width:100%;
  background:var(--dark);
  color:white; border:none;
  padding:10px;
  border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:11px; font-weight:500;
  letter-spacing:.1em; text-transform:uppercase;
  cursor:pointer; transition:background .2s;
}

.card button:hover { background:var(--pink); }
.card button.sold-btn { background:#ccc; color:#999; cursor:not-allowed; }

/* EMPTY */
.empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:#bbb; }
.empty h3 { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; margin-bottom:8px; color:#ccc; }

/* MODAL */
#productModal {
  display:none;
  position:fixed; inset:0;
  background:rgba(14,12,13,.8);
  z-index:200;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
  padding:20px;
}

#productModal.open { display:flex; }

.modal-box {
  background:white; border-radius:14px;
  max-width:460px; width:100%;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.3);
  animation:slideUp .3s ease;
  max-height:92svh;
  overflow-y:auto;
}

@keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

.modal-box img { width:100%; height:clamp(220px,50vw,300px); object-fit:cover; display:block; }
.modal-body { padding:clamp(18px,4vw,24px); }
.modal-body h2 { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,4vw,28px); font-weight:400; margin-bottom:6px; }
.modal-meta { font-size:12px; color:#999; margin-bottom:8px; }
.modal-price { color:var(--pink); font-size:clamp(18px,3vw,22px); font-weight:600; margin-bottom:18px; }
.modal-actions { display:flex; gap:10px; }
.modal-actions button { flex:1; padding:12px; border-radius:7px; border:none; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:background .2s; }
.btn-wa { background:var(--pink); color:white; }
.btn-wa:hover { background:var(--pink-l); }
.btn-close { background:#f0ece8; color:#555; }
.btn-close:hover { background:#e5e0dc; }

/* RESPONSIVE */
@media (max-width:600px) {
  .controls { top:57px; }
  .result-count { display:none; }
  .controls input,
  .controls select { max-width:100%; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo" aria-label="VRC Home">
    <svg viewBox="0 0 340 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 14 L50 76 L92 14" stroke="#d4688a" stroke-width="5.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M108 76 L108 14 L148 14 C165 14 178 27 178 44 C178 61 165 74 148 74 L108 74" stroke="#d4688a" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M148 74 L182 76" stroke="#d4688a" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <path d="M328 30 C319 18 304 10 286 10 C260 10 240 30 240 45 C240 60 260 80 286 80 C304 80 319 72 328 60" stroke="#d4688a" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    </svg>
  </a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>The Catalog</h1>
  <p>Curated second-hand luxury — updated regularly.</p>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input id="search" type="search" placeholder="Search brand or category…" />
  <select id="categoryFilter"><option value="">All Categories</option></select>
  <select id="sizeFilter"><option value="">All Sizes</option></select>
  <label class="check-label">
    <input type="checkbox" id="availableOnly" /> Available only
  </label>
  <span class="result-count" id="resultCount"></span>
</div>

<!-- GRID -->
<div class="grid" id="catalog"></div>

<!-- MODAL -->
<div id="productModal">
  <div class="modal-box">
    <img id="modalImage" src="" alt="" />
    <div class="modal-body">
      <h2 id="modalBrand"></h2>
      <p class="modal-meta" id="modalInfo"></p>
      <p class="modal-price" id="modalPrice"></p>
      <div class="modal-actions">
        <button class="btn-wa" id="modalBuy">Buy on WhatsApp</button>
        <button class="btn-close" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuEKefQDxrysNzNz9r0jcE4awZ4Ck27lj4kq613Rd3KYrHawN-epn-qsrWg1Hs2gRXETsI6VhLqQ74/pub?output=csv";
const phone = "50766720627";
let items = [];

const searchInput    = document.getElementById("search");
const categoryFilter = document.getElementById("categoryFilter");
const sizeFilter     = document.getElementById("sizeFilter");
const availableOnly  = document.getElementById("availableOnly");
const catalog        = document.getElementById("catalog");
const resultCount    = document.getElementById("resultCount");

fetch(sheetURL)
  .then(r => r.text())
  .then(data => {
    const rows = data.split("\n").slice(1).filter(r => r.trim());
    rows.forEach(r => {
      const c = r.split(",");
      items.push({
        id:        (c[0]||"").trim(),
        category:  (c[1]||"").trim(),
        brand:     (c[2]||"").trim(),
        size:      (c[3]||"").trim(),
        price:     (c[4]||"").trim(),
        condition: (c[5]||"").trim(),
        photo:     (c[6]||"").trim(),
        status:    (c[7]||"").trim()
      });
    });
    populateFilters();

    // Honour pre-filter from homepage category cards
    const prefilter = sessionStorage.getItem("vrc_filter_cat");
    if (prefilter) {
      categoryFilter.value = prefilter;
      sessionStorage.removeItem("vrc_filter_cat");
    }

    render();
  })
  .catch(() => {
    catalog.innerHTML = `<div class="empty"><h3>Couldn't load catalog</h3><p>Please check your connection and try again.</p></div>`;
  });

function populateFilters() {
  const catSet  = new Set();
  const sizeSet = new Set();
  items.forEach(i => { if(i.category) catSet.add(i.category); if(i.size) sizeSet.add(i.size); });
  catSet.forEach(c  => { categoryFilter.innerHTML += `<option value="${c}">${c}</option>`; });
  sizeSet.forEach(s => { sizeFilter.innerHTML     += `<option value="${s}">${s}</option>`; });
}

function render() {
  const search    = searchInput.value.toLowerCase();
  const cat       = categoryFilter.value;
  const size      = sizeFilter.value;
  const available = availableOnly.checked;

  const filtered = items.filter(i => {
    if (search    && !(i.brand + i.category).toLowerCase().includes(search)) return false;
    if (cat       && i.category !== cat)  return false;
    if (size      && i.size     !== size) return false;
    if (available && i.status   !== "Available") return false;
    return true;
  });

  resultCount.textContent = `${filtered.length} piece${filtered.length !== 1 ? "s" : ""}`;
  catalog.innerHTML = "";

  if (!filtered.length) {
    catalog.innerHTML = `<div class="empty"><h3>No pieces found</h3><p>Try adjusting your filters.</p></div>`;
    return;
  }

  filtered.forEach(i => {
    const sold = i.status !== "Available";
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${i.photo}" alt="${i.brand}" loading="lazy" />
        ${sold ? '<span class="sold-badge">Sold</span>' : ""}
      </div>
      <div class="card-content">
        <h3>${i.brand}</h3>
        <p class="card-meta">${i.category} · Size ${i.size} · ${i.condition}</p>
        <p class="price">$${i.price}</p>
        <button class="${sold ? "sold-btn" : ""}" ${sold ? "disabled" : ""}>
          ${sold ? "Sold Out" : "Buy on WhatsApp"}
        </button>
      </div>`;
    if (!sold) {
      card.querySelector("button").onclick = () => openModal(i.id);
      card.querySelector(".card-img-wrap").onclick = () => openModal(i.id);
    }
    catalog.appendChild(card);
  });
}

function openModal(id) {
  const i = items.find(x => x.id === id);
  if (!i) return;
  document.getElementById("modalImage").src  = i.photo;
  document.getElementById("modalBrand").textContent = i.brand;
  document.getElementById("modalInfo").textContent  = `${i.category} · Size ${i.size} · ${i.condition}`;
  document.getElementById("modalPrice").textContent = `$${i.price}`;
  document.getElementById("modalBuy").onclick = () => buy(id);
  document.getElementById("productModal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("productModal").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("productModal").addEventListener("click", e => {
  if (e.target === document.getElementById("productModal")) closeModal();
});

function buy(id) {
  const msg = `Hi! I'm interested in item ${id} from VRC Thrift Shop.`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

searchInput.oninput    = render;
categoryFilter.onchange = render;
sizeFilter.onchange     = render;
availableOnly.onchange  = render;
</script>

</body>
</html>
